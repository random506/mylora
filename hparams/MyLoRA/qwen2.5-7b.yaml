# 方案C配置：Qwen2.5-7B
alg_name: "SchemeC_CrispLoRA"
model_name: "Qwen/Qwen2.5-7B-Instruct"
device: 0
model_parallel: false

layers: [15, 16, 17, 18, 19]
rewrite_module_tmp: "model.layers.{}.mlp.down_proj"
layer_module_tmp: "model.layers.{}"
mlp_module_tmp: "model.layers.{}.mlp"
attn_module_tmp: "model.layers.{}.self_attn"
ln_f_module: "model.norm"
lm_head_module: "lm_head"

lora_type: "lora"
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules: ["down_proj"]

num_steps: 25
lr: 5.0e-4
weight_decay: 0
batch_size: 32
max_length: 40
objective_optimization: "target_new"

mom2_dataset: "wikipedia"
mom2_n_samples: 1000
mom2_dtype: "float32"
energy_threshold: 0.99

use_kfac_init: true
use_projected_optimizer: true
projection_mode: "marginal_AB"
normalize_init: true

recalculate_cache: false
recalculate_weight_threshold: 0.1
edit_cache_style: "pretrain_only"
edit_n_samples: 10
disable_old_loss_check: true

kl_factor: 0
norm_constraint: false
