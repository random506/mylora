# 方案D配置：KFac能量驱动的自适应LoRA秩分配（LLaMA3-8B）
# 适用于：希望不同层使用不同rank，让KFac"自动决定"各层编辑容量
# 特点：安全子空间越大的层分配越多rank，自动平衡编辑能力和安全性

alg_name: "SchemeD_AdaptiveRankLoRA"
model_name: "meta-llama/Meta-Llama-3-8B-Instruct"
device: 0
model_parallel: false

layers: [19, 20, 21, 22, 23]
rewrite_module_tmp: "model.layers.{}.mlp.down_proj"
layer_module_tmp: "model.layers.{}"
mlp_module_tmp: "model.layers.{}.mlp"
attn_module_tmp: "model.layers.{}.self_attn"
ln_f_module: "model.norm"
lm_head_module: "lm_head"

# LoRA基本配置（具体rank由自适应分配决定）
lora_type: "adalora"   # 使用AdaLoRA以支持动态rank调整
lora_alpha: 16
lora_dropout: 0.05
target_modules: ["down_proj"]

num_steps: 25
lr: 5.0e-4
weight_decay: 0
batch_size: 32
max_length: 40
objective_optimization: "target_new"

mom2_dataset: "wikipedia"
mom2_n_samples: 1000
mom2_dtype: "float32"
energy_threshold: 0.99

# 方案D特有：自适应rank分配
total_rank_budget: 40       # 总rank预算（分配给所有目标层）
min_rank_per_layer: 2       # 单层最小rank
max_rank_per_layer: 16      # 单层最大rank

# rank分配映射策略
# "linear"  : rank ∝ 安全比例（直接比例）
# "sqrt"    : rank ∝ sqrt(安全比例)（更平衡，推荐）
# "log"     : rank ∝ log(1 + 9*安全比例)（对小差异更敏感）
# "uniform" : 等额分配（对比baseline）
rank_allocation_strategy: "sqrt"
verbose_rank_alloc: true    # 是否打印rank分配详情表

# 是否在AdaLoRA基础上叠加方案A的边缘化投影（更强约束但更慢）
use_projected_optimizer: false
projection_mode: "marginal_AB"

kl_factor: 0
norm_constraint: false
